name: Drone-Spatial-QA Framework CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB:       dronedb
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dronedb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST:                 localhost
      DB_PORT:                 5432
      DB_NAME:                 dronedb
      DB_USER:                 postgres
      DB_PASSWORD:             postgres
      API_BASE_URL:            http://localhost:3001
      UI_BASE_URL:             http://localhost:8080
      MAX_PATH_DEVIATION_METERS: 5
      NODE_ENV:                test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox --with-deps

      - name: Initialise PostGIS schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d dronedb -f db/init.sql
        timeout-minutes: 2

      - name: Start Express API server
        run: |
          npx ts-node --project tsconfig.json src/api/server.ts &
          echo "API_PID=$!" >> $GITHUB_ENV
          # Wait for API health check
          for i in $(seq 1 15); do
            curl -sf http://localhost:3001/health && echo "API ready" && break
            echo "Waiting for API... ($i/15)"
            sleep 2
          done
        timeout-minutes: 2

      - name: Start Nginx UI server
        run: |
          docker run -d \
            --name drone_ui \
            -p 8080:80 \
            -v ${{ github.workspace }}/src/ui:/usr/share/nginx/html:ro \
            -v ${{ github.workspace }}/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:alpine
          sleep 3
          curl -sf http://localhost:8080/health || echo "UI health check skipped"
        timeout-minutes: 2

      - name: Run Playwright tests
        run: npx playwright test --reporter=list,allure-playwright

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test videos & traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          docker stop drone_ui 2>/dev/null || true
          kill $API_PID 2>/dev/null || true
