name: Drone-Spatial-QA Framework CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:   # ← enables manual "Run workflow" button on GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB:       dronedb
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dronedb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_HOST:                   localhost
      DB_PORT:                   5432
      DB_NAME:                   dronedb
      DB_USER:                   postgres
      DB_PASSWORD:               postgres
      API_BASE_URL:              http://localhost:3001
      UI_BASE_URL:               http://localhost:8080
      MAX_PATH_DEVIATION_METERS: 5
      NODE_ENV:                  test

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Dependencies ──────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium + Firefox)
        run: npx playwright install chromium firefox --with-deps

      # ── 4. Environment ───────────────────────────────────────────────────────
      - name: Copy env file
        run: cp .env.example .env

      # ── 5. Database ───────────────────────────────────────────────────────────
      - name: Initialise PostGIS schema
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 20); do
            PGPASSWORD=postgres psql -h localhost -U postgres -d dronedb -c "SELECT 1;" && break
            echo "  Retry $i/20..."
            sleep 3
          done
          PGPASSWORD=postgres psql -h localhost -U postgres -d dronedb -f db/init.sql
          echo "✅ PostGIS schema initialised"

      # ── 6. Express API ────────────────────────────────────────────────────────
      - name: Start Express API server
        run: |
          nohup npx ts-node --project tsconfig.json src/api/server.ts > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          echo "Waiting for API health check..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/health && echo "✅ API is ready" && break
            echo "  Waiting... ($i/20)"
            sleep 3
          done

      # ── 7. Nginx UI ───────────────────────────────────────────────────────────
      - name: Start Nginx UI server
        run: |
          docker run -d \
            --name drone_ui \
            --add-host=host.docker.internal:host-gateway \
            -p 8080:80 \
            -v ${{ github.workspace }}/src/ui:/usr/share/nginx/html:ro \
            -v ${{ github.workspace }}/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:alpine
          sleep 5
          curl -sf http://localhost:8080/ && echo "✅ UI is ready" || echo "UI health check skipped"

      # ── 8. Tests ──────────────────────────────────────────────────────────────
      - name: Run Playwright test suite
        run: npx playwright test --reporter=list,allure-playwright

      # ── 9. Artifacts ──────────────────────────────────────────────────────────
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test videos & traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: test-results/
          retention-days: 7

      - name: Show API logs (on failure)
        if: failure()
        run: cat /tmp/api.log || echo "No API logs found"

      # ── 10. Cleanup ───────────────────────────────────────────────────────────
      - name: Cleanup services
        if: always()
        run: |
          docker stop drone_ui 2>/dev/null || true
          kill $(cat /tmp/api.pid 2>/dev/null) 2>/dev/null || true
